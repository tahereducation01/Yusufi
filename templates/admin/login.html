{% extends "base.html" %}
{% block title %}Admin Login — SafetyPro Supply{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto mt-12 px-4">
  <div class="bg-white shadow-sm rounded-3xl border border-gray-200 p-8">
    <h1 class="text-3xl font-extrabold text-navy-dark mb-4">Admin Panel Sign In</h1>
    <p class="text-sm text-gray-500 mb-6">Use your admin credentials to manage products, orders, brands, categories, and bids.</p>
    <form action="/admin/login" method="post" class="space-y-4">
      <label class="block">
        <span class="text-sm font-medium text-gray-700">Email</span>
        <input type="email" name="email" required class="mt-1 block w-full rounded-xl border-gray-300 shadow-sm focus:border-brand focus:ring-brand" />
      </label>
      <label class="block">
        <span class="text-sm font-medium text-gray-700">Password</span>
        <input type="password" name="password" required class="mt-1 block w-full rounded-xl border-gray-300 shadow-sm focus:border-brand focus:ring-brand" />
      </label>
      <button type="submit" class="w-full bg-brand-dark text-white py-3 rounded-xl font-semibold hover:bg-brand transition">Sign in as Admin</button>
    </form>
  </div>
</div>
{% endblock %}
