{% extends "base.html" %}
{% block title %}Sign In — Yusufi Hardware{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12">
  <div class="max-w-md w-full mx-4">
    <div class="bg-white rounded-2xl border border-gray-200 shadow-xl p-8">
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-gradient-to-br from-brand to-brand-dark rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
          <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2L2 7v5c0 5.25 4.25 10.15 10 11.35C17.75 22.15 22 17.25 22 12V7L12 2z"/>
          </svg>
        </div>
        <h1 class="text-2xl font-extrabold text-navy-dark">Welcome Back</h1>
        <p class="text-sm text-gray-500 mt-2">Sign in to access your account and orders</p>
      </div>

      <form action="/login" method="post" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2" for="email">
            Email Address
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/>
              </svg>
            </div>
            <input type="email" id="email" name="email" required autofocus
                   placeholder="you@company.com"
                   class="w-full border border-gray-300 rounded-xl pl-10 pr-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition" />
          </div>
        </div>
        
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2" for="password">
            Password
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              </svg>
            </div>
            <input type="password" id="password" name="password" required
                   placeholder="••••••••"
                   class="w-full border border-gray-300 rounded-xl pl-10 pr-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent transition" />
          </div>
        </div>

        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2">
            <input type="checkbox" class="rounded border-gray-300 text-brand focus:ring-brand">
            <span class="text-sm text-gray-600">Remember me</span>
          </label>
          <a href="#" class="text-sm text-brand hover:underline">Forgot password?</a>
        </div>

        <button type="submit"
                class="w-full bg-gradient-to-r from-brand to-brand-dark hover:from-brand-dark hover:to-brand text-white font-extrabold py-3 rounded-xl transition-all duration-200 shadow-md hover:shadow-lg">
          Sign In
        </button>
      </form>

      <div class="mt-6 pt-6 border-t border-gray-200">
        <div class="relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-300"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-white text-gray-500">New to Yusufi Hardware?</span>
          </div>
        </div>
        
        <a href="/register" 
           class="mt-4 w-full block text-center bg-gray-100 hover:bg-gray-200 text-gray-800 font-semibold py-3 rounded-xl transition-all duration-200">
          Create an Account
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
